name: Tests & Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15  # Includes pgvector extension for semantic search
        env:
          POSTGRES_DB: cve_mcp_test
          POSTGRES_USER: cve_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc --skip-editable
        continue-on-error: true  # Don't block on moderate vulnerabilities

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
        continue-on-error: false

      - name: Type check with mypy
        run: |
          mypy src/
        continue-on-error: false

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://cve_user:test_password@localhost:5432/cve_mcp_test
          DATABASE_URL_SYNC: postgresql://cve_user:test_password@localhost:5432/cve_mcp_test
          REDIS_URL: redis://localhost:6379/0
          LOG_LEVEL: DEBUG
        run: |
          pytest tests/ -v --cov=src/cve_mcp --cov-report=term --cov-report=xml --cov-report=json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract coverage percentage
          if [ -f coverage.json ]; then
            COVERAGE=$(python -c "import json; data=json.load(open('coverage.json')); print(f\"{data['totals']['percent_covered']:.1f}\")")
            echo "**Code Coverage:** ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting (ruff) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Type checking (mypy) | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Security audit | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ✅ |" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.json ]; then
            echo "| Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          fi
