name: Mirror CISA KEV

on:
  schedule:
    - cron: '30 1 * * *'  # Daily 01:30 UTC (before sync window)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download CISA KEV catalog
        run: |
          curl -fsSL \
            -H "User-Agent: Mozilla/5.0 (compatible; Ansvar-KEV-Mirror/1.0)" \
            -o data/known_exploited_vulnerabilities.json \
            "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"

      - name: Validate JSON
        run: |
          python3 -c "
          import json, sys
          with open('data/known_exploited_vulnerabilities.json') as f:
              d = json.load(f)
          vulns = d.get('vulnerabilities', [])
          version = d.get('catalogVersion', '?')
          print(f'KEV catalog v{version}: {len(vulns)} vulnerabilities')
          if len(vulns) < 1000:
              print('ERROR: suspiciously low count')
              sys.exit(1)
          "

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/known_exploited_vulnerabilities.json
          if git diff --cached --quiet; then
            echo "No changes to KEV catalog"
          else
            COUNT=$(python3 -c "import json; print(len(json.load(open('data/known_exploited_vulnerabilities.json')).get('vulnerabilities',[])))")
            git commit -m "data: mirror CISA KEV catalog ($COUNT vulnerabilities)"
            git push
          fi
