version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg15  # Includes pgvector extension for semantic search
    container_name: cve-mcp-postgres
    environment:
      POSTGRES_DB: cve_mcp
      POSTGRES_USER: cve_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Use 5433 externally to avoid conflict with platform postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cve_user -d cve_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cve-mcp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cve-mcp-server:
    build: .
    container_name: cve-mcp-server
    ports:
      - "8307:8307"
    environment:
      DATABASE_URL: postgresql+asyncpg://cve_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cve_mcp
      DATABASE_URL_SYNC: postgresql://cve_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cve_mcp
      REDIS_URL: redis://redis:6379/0
      NVD_API_KEY: ${NVD_API_KEY:-}
      MCP_PORT: 8307
      MCP_HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8307/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: cve-mcp-worker
    command: celery -A cve_mcp.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://cve_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cve_mcp
      DATABASE_URL_SYNC: postgresql://cve_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cve_mcp
      REDIS_URL: redis://redis:6379/0
      NVD_API_KEY: ${NVD_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: cve-mcp-beat
    command: celery -A cve_mcp.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://cve_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cve_mcp
      DATABASE_URL_SYNC: postgresql://cve_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/cve_mcp
      REDIS_URL: redis://redis:6379/0
      NVD_API_KEY: ${NVD_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
